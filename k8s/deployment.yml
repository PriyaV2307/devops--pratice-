apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-practice

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-practice

  template:
    metadata:
      labels:
        app: devops-practice

    spec:
      containers:
        - name: app
          image: priyav2307/devops-practice-app:v1

          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_NAME

            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT

          ports:
            - containerPort: 8080